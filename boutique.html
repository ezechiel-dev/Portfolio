<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique Pro</title>
  <link rel="stylesheet" href="boutique.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">ShopPro</div>
    <nav class="nav">
      <a href="accueilbou.html">Accueil</a>
      <a href="produits.html">Produits</a>
      <a href="contactsbou.html">Contact</a>
    </nav>
    <div class="actions">
      <input type="text" placeholder="Rechercher...">
      <button>Panier</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Les meilleures offres du moment</h1>
    <p>Découvrez nos produits de qualité à prix imbattables</p>
    <button>Voir les produits</button>
  </section>

  <!-- PRODUITS -->
  <section id="produits" class="products">
    <h2>Nos Produits</h2>
    <div class="product-grid">

      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Produit">
        <h3>Produit 1</h3>
        <p>20€</p>
        <button>Ajouter au panier</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Produit">
        <h3>Produit 2</h3>
        <p>35€</p>
        <button>Ajouter au panier</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Produit">
        <h3>Produit 3</h3>
        <p>50€</p>
        <button>Ajouter au panier</button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer id="contact" class="footer">
    <p>&copy; 2026 ShopPro | Contact: contact@shoppro.com</p>
  </footer>

</body>
</html>
