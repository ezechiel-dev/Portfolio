<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Compétences</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
background:#f4f6f8;
}

section{
padding:60px 10%;
}

h2{
text-align:center;
margin-bottom:40px;
color:#333;
}

.skills-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.skill-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.skill-card:hover{
transform:translateY(-5px);
}

.skill-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#222;
}

.skill-description{
font-size:15px;
color:#555;
line-height:1.6;
}

.retour {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background-color: #0984e3;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  font-weight: bold;
  transition: 0.3s;
}

.retour:hover {
  background-color: #0652DD;
  transform: scale(1.05);
}

.centre {
  text-align: center;
}

</style>
</head>

<body>

<section id="skills">

<h2>Compétences et Expériences</h2>

<div class="skills-container">

<div class="skill-card">
<div class="skill-title">Encadrement pédagogique</div>

<div class="skill-description">
Encadrement des élèves de la classe de <strong>quatrième à la terminale</strong>.  
Dispense de cours et accompagnement académique afin d'améliorer leur compréhension et leurs performances scolaires.
</div>

</div>

</div>

</section>

<div class="centre">
  <a href="index.html" class="retour">Retour à l'accueil</a>
 </div> 

</body>
</html>
